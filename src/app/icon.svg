<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Ice Gradient -->
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="60%" stop-color="#bae6fd" />
      <stop offset="100%" stop-color="#7dd3fc" />
    </linearGradient>
    <!-- Mic Gradient: Bridges Light Terracotta and Dark Purple themes -->
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9f402d" />
      <stop offset="50%" stop-color="#b84e3a" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ice Cube Base (Soft Neumorphic Card) -->
  <rect x="16" y="16" width="96" height="96" rx="24" fill="url(#iceGrad)" stroke="#38bdf8" stroke-width="3" />
  
  <!-- Back Shading / Shadow inside ice -->
  <rect x="22" y="22" width="84" height="84" rx="18" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6" />

  <!-- Ice Cube Cracks (Shattering Effect) -->
  <path d="M16,50 L48,64 L36,88" stroke="#0284c7" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />
  <path d="M112,78 L80,64 L92,36" stroke="#0284c7" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />
  <path d="M64,16 L64,36" stroke="#0284c7" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85" />
  <path d="M64,112 L64,96" stroke="#0284c7" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85" />

  <!-- Microphone breaking out -->
  <g filter="url(#glow)">
    <!-- Stand / Base -->
    <path d="M52,94 L76,94 M64,94 L64,82" stroke="url(#micGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <!-- U-shape holder -->
    <path d="M46,58 C46,78 82,78 82,58" fill="none" stroke="url(#micGrad)" stroke-width="6" stroke-linecap="round" />
    <!-- Mic Body -->
    <rect x="52" y="34" width="24" height="38" rx="12" fill="url(#micGrad)" stroke="#ffffff" stroke-width="2.5" />
    <!-- Mic Grill Details -->
    <line x1="52" y1="46" x2="76" y2="46" stroke="#ffffff" stroke-width="2" />
    <line x1="52" y1="56" x2="76" y2="56" stroke="#ffffff" stroke-width="2" />
    <line x1="64" y1="34" x2="64" y2="72" stroke="#ffffff" stroke-width="2" opacity="0.4" />
  </g>
</svg>
